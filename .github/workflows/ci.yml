name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  u0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # pnpm version comes from package.json#packageManager
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

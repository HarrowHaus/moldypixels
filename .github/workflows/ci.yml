name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  u0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # pnpm version comes from package.json#packageManager
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: reference pipeline (U1)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet pillow
          .venv/bin/python reference/measure.py --self-test
          .venv/bin/python reference/measure.py --check
